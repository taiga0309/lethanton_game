<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ao Dai Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 100%);
            border: 3px solid #2F4F4F;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(47, 79, 79, 0.3);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 70%, #8FBC8F 100%);
            border-radius: 12px;
            cursor: pointer;
        }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #2F4F4F;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 10;
            background: rgba(255,255,255,0.7);
            padding: 12px 18px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #2F4F4F;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 20px;
            border: 3px solid #2F4F4F;
            display: none;
            z-index: 20;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        #gameOver h2 {
            margin-bottom: 15px;
            font-size: 28px;
            color: #DC143C;
        }

        #gameOver p {
            margin: 10px 0;
            font-size: 18px;
        }

        #restartBtn {
            background: linear-gradient(45deg, #32CD32, #228B22);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #restartBtn:hover {
            transform: translateY(-2px);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2F4F4F;
            font-size: 16px;
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10;
        }

        #loadingText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2F4F4F;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="loadingText">Loading...</div>
        <div id="ui" style="display: none;">
            <div>Score: <span id="score">0</span></div>
        </div>
        <div id="instructions" style="display: none;">
            Tap or Click to Jump!
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Best Score: <span id="bestScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        class AoDaiRunner {
            constructor() {
                // Wait for DOM to be ready
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => this.init());
                } else {
                    this.init();
                }
            }
            
            init() {
                this.canvas = document.getElementById('gameCanvas');
                if (!this.canvas) {
                    console.error('Canvas element not found!');
                    return;
                }
                
                this.ctx = this.canvas.getContext('2d');
                this.setupCanvas();
                
                this.gameState = 'loading';
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('aoDaiRunnerBest')) || 0;
                this.gameSpeed = 4;
                this.gravity = 0.6;
                
                // Images
                this.images = {
                    player: null,
                    obstacle: null
                };
                this.imagesLoaded = 0;
                this.totalImages = 2;
                
                // Player properties
                this.player = {
                    x: 80,
                    y: 0,
                    width: 40,
                    height: 50,
                    velocityY: 0,
                    isJumping: false,
                    jumpPower: -15,
                    groundY: 0,
                    animFrame: 0
                };
                
                // Obstacles
                this.obstacles = [];
                this.obstacleSpawnTimer = 0;
                this.obstacleSpawnInterval = 120;
                
                // Ground
                this.groundY = 0;
                this.groundPattern = [];
                
                // Clouds for background
                this.clouds = [];
                
                this.loadImages();
            }
            
            setupCanvas() {
                const maxWidth = Math.min(window.innerWidth - 40, 800);
                const maxHeight = Math.min(window.innerHeight - 40, 400);
                
                this.canvas.width = maxWidth;
                this.canvas.height = maxHeight;
                
                this.groundY = this.canvas.height - 60;
                this.player.groundY = this.groundY - this.player.height;
                this.player.y = this.player.groundY;
            }
            
            loadImages() {
                // Player (Vietnamese lady in ao dai running)
                this.images.player = new Image();
                this.images.player.onload = () => {
                    this.imagesLoaded++;
                    this.checkImagesLoaded();
                };
                this.images.player.onerror = () => {
                    console.log('Player image failed to load');
                    this.imagesLoaded++;
                    this.checkImagesLoaded();
                };
                this.images.player.src = 'data:image/svg+xml;base64,' + btoa(`
                    <svg width="40" height="50" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="12" r="8" fill="#fdbcb4"/>
                        <path d="M12 5 Q20 2 28 5 Q28 8 20 10 Q12 8 12 5" fill="#2c3e50"/>
                        <circle cx="16" cy="10" r="1.5" fill="#333"/>
                        <circle cx="24" cy="10" r="1.5" fill="#333"/>
                        <path d="M16 14 Q20 16 24 14" stroke="#333" stroke-width="1" fill="none"/>
                        <rect x="10" y="18" width="20" height="32" rx="10" fill="#DC143C"/>
                        <rect x="12" y="20" width="16" height="28" rx="8" fill="#B22222"/>
                        <ellipse cx="8" cy="25" rx="3" ry="8" fill="#fdbcb4"/>
                        <ellipse cx="32" cy="25" rx="3" ry="8" fill="#fdbcb4"/>
                        <rect x="15" y="45" width="4" height="5" fill="#fdbcb4"/>
                        <rect x="21" y="45" width="4" height="5" fill="#fdbcb4"/>
                    </svg>
                `);
                
                // Obstacle (bamboo)
                this.images.obstacle = new Image();
                this.images.obstacle.onload = () => {
                    this.imagesLoaded++;
                    this.checkImagesLoaded();
                };
                this.images.obstacle.onerror = () => {
                    console.log('Obstacle image failed to load');
                    this.imagesLoaded++;
                    this.checkImagesLoaded();
                };
                this.images.obstacle.src = 'data:image/svg+xml;base64,' + btoa(`
                    <svg width="30" height="40" xmlns="http://www.w3.org/2000/svg">
                        <rect x="12" y="0" width="6" height="40" fill="#228B22"/>
                        <rect x="10" y="5" width="10" height="3" fill="#32CD32"/>
                        <rect x="10" y="15" width="10" height="3" fill="#32CD32"/>
                        <rect x="10" y="25" width="10" height="3" fill="#32CD32"/>
                        <rect x="10" y="35" width="10" height="3" fill="#32CD32"/>
                        <ellipse cx="8" cy="8" rx="4" ry="2" fill="#90EE90"/>
                        <ellipse cx="22" cy="12" rx="4" ry="2" fill="#90EE90"/>
                        <ellipse cx="6" cy="20" rx="4" ry="2" fill="#90EE90"/>
                        <ellipse cx="24" cy="28" rx="4" ry="2" fill="#90EE90"/>
                    </svg>
                `);
            }
            
            checkImagesLoaded() {
                if (this.imagesLoaded >= this.totalImages) {
                    document.getElementById('loadingText').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                    document.getElementById('instructions').style.display = 'block';
                    this.setupEventListeners();
                    this.initializeGame();
                    this.gameLoop();
                }
            }
            
            initializeGame() {
                // Initialize clouds
                for (let i = 0; i < 5; i++) {
                    this.clouds.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * (this.canvas.height * 0.3),
                        width: 40 + Math.random() * 40,
                        height: 20 + Math.random() * 20,
                        speed: 0.5 + Math.random() * 1
                    });
                }
                
                // Initialize ground pattern
                for (let i = 0; i < Math.ceil(this.canvas.width / 20); i++) {
                    this.groundPattern.push({
                        x: i * 20,
                        type: Math.random() > 0.7 ? 'grass' : 'dirt'
                    });
                }
                
                this.resetGame();
            }
            
            setupEventListeners() {
                // Touch events
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleJump();
                });
                
                // Mouse events
                this.canvas.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    this.handleJump();
                });
                
                // Keyboard events
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' || e.code === 'ArrowUp') {
                        e.preventDefault();
                        this.handleJump();
                    }
                });
                
                // Restart button
                const restartBtn = document.getElementById('restartBtn');
                if (restartBtn) {
                    restartBtn.addEventListener('click', () => {
                        this.restartGame();
                    });
                }
            }
            
            handleJump() {
                if (this.gameState === 'gameOver') {
                    this.restartGame();
                    return;
                }
                
                if (this.gameState === 'playing' && !this.player.isJumping) {
                    this.player.velocityY = this.player.jumpPower;
                    this.player.isJumping = true;
                }
            }
            
            resetGame() {
                this.gameState = 'playing';
                this.score = 0;
                this.gameSpeed = 4;
                
                // Reset player
                this.player.y = this.player.groundY;
                this.player.velocityY = 0;
                this.player.isJumping = false;
                this.player.animFrame = 0;
                
                // Clear obstacles
                this.obstacles = [];
                this.obstacleSpawnTimer = 0;
                
                // Hide game over screen
                const gameOverDiv = document.getElementById('gameOver');
                const instructionsDiv = document.getElementById('instructions');
                if (gameOverDiv) gameOverDiv.style.display = 'none';
                if (instructionsDiv) instructionsDiv.style.display = 'none';
            }
            
            restartGame() {
                this.resetGame();
            }
            
            update() {
                if (this.gameState !== 'playing') return;
                
                // Update score
                this.score += 1;
                
                // Increase game speed gradually
                this.gameSpeed = 4 + (this.score / 1000);
                
                // Update player physics
                if (this.player.isJumping) {
                    this.player.velocityY += this.gravity;
                    this.player.y += this.player.velocityY;
                    
                    // Check if landed
                    if (this.player.y >= this.player.groundY) {
                        this.player.y = this.player.groundY;
                        this.player.velocityY = 0;
                        this.player.isJumping = false;
                    }
                }
                
                // Update player animation
                this.player.animFrame += 0.2;
                
                // Spawn obstacles
                this.obstacleSpawnTimer++;
                if (this.obstacleSpawnTimer >= this.obstacleSpawnInterval) {
                    this.spawnObstacle();
                    this.obstacleSpawnTimer = 0;
                    
                    // Gradually decrease spawn interval (increase difficulty)
                    this.obstacleSpawnInterval = Math.max(60, 120 - Math.floor(this.score / 500));
                }
                
                // Update obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obstacle = this.obstacles[i];
                    obstacle.x -= this.gameSpeed;
                    
                    // Remove off-screen obstacles
                    if (obstacle.x + obstacle.width < 0) {
                        this.obstacles.splice(i, 1);
                        continue;
                    }
                    
                    // Check collision
                    if (this.checkCollision(this.player, obstacle)) {
                        this.gameOver();
                        return;
                    }
                }
                
                // Update clouds
                this.clouds.forEach(cloud => {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.width < 0) {
                        cloud.x = this.canvas.width;
                        cloud.y = Math.random() * (this.canvas.height * 0.3);
                    }
                });
                
                // Update ground pattern
                this.groundPattern.forEach(ground => {
                    ground.x -= this.gameSpeed;
                    if (ground.x < -20) {
                        ground.x += this.groundPattern.length * 20;
                    }
                });
                
                // Update UI
                const scoreElement = document.getElementById('score');
                if (scoreElement) {
                    scoreElement.textContent = this.score;
                }
            }
            
            spawnObstacle() {
                const obstacle = {
                    x: this.canvas.width,
                    y: this.groundY - 40,
                    width: 30,
                    height: 40
                };
                
                this.obstacles.push(obstacle);
            }
            
            checkCollision(player, obstacle) {
                return player.x < obstacle.x + obstacle.width &&
                       player.x + player.width > obstacle.x &&
                       player.y < obstacle.y + obstacle.height &&
                       player.y + player.height > obstacle.y;
            }
            
            gameOver() {
                this.gameState = 'gameOver';
                
                // Update best score
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('aoDaiRunnerBest', this.bestScore.toString());
                }
                
                const finalScoreElement = document.getElementById('finalScore');
                const bestScoreElement = document.getElementById('bestScore');
                const gameOverDiv = document.getElementById('gameOver');
                
                if (finalScoreElement) finalScoreElement.textContent = this.score;
                if (bestScoreElement) bestScoreElement.textContent = this.bestScore;
                if (gameOverDiv) gameOverDiv.style.display = 'block';
            }
            
            draw() {
                if (!this.ctx) return;
                
                // Clear canvas with sky gradient
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.7, '#90EE90');
                gradient.addColorStop(1, '#8FBC8F');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw clouds
                this.clouds.forEach(cloud => {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    this.ctx.beginPath();
                    this.ctx.arc(cloud.x, cloud.y, cloud.width/4, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x + cloud.width/3, cloud.y, cloud.width/3, 0, Math.PI * 2);
                    this.ctx.arc(cloud.x + cloud.width*2/3, cloud.y, cloud.width/4, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                
                // Draw ground
                this.ctx.fillStyle = '#8FBC8F';
                this.ctx.fillRect(0, this.groundY, this.canvas.width, this.canvas.height - this.groundY);
                
                // Draw ground pattern
                this.groundPattern.forEach(ground => {
                    if (ground.type === 'grass') {
                        this.ctx.fillStyle = '#90EE90';
                        this.ctx.fillRect(ground.x, this.groundY, 20, 5);
                    }
                });
                
                // Draw obstacles
                this.obstacles.forEach(obstacle => {
                    if (this.images.obstacle && this.images.obstacle.complete) {
                        this.ctx.drawImage(
                            this.images.obstacle,
                            obstacle.x,
                            obstacle.y,
                            obstacle.width,
                            obstacle.height
                        );
                    } else {
                        this.ctx.fillStyle = '#228B22';
                        this.ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                    }
                });
                
                // Draw player
                if (this.images.player && this.images.player.complete) {
                    this.ctx.save();
                    
                    // Add slight bounce animation when running
                    if (!this.player.isJumping) {
                        const bounce = Math.sin(this.player.animFrame) * 2;
                        this.ctx.translate(0, bounce);
                    }
                    
                    this.ctx.drawImage(
                        this.images.player,
                        this.player.x,
                        this.player.y,
                        this.player.width,
                        this.player.height
                    );
                    
                    this.ctx.restore();
                } else {
                    // Fallback rectangle
                    this.ctx.fillStyle = '#DC143C';
                    this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                }
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start the game when everything is loaded
        new AoDaiRunner();
    </script>
</body>
</html>
