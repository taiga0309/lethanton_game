<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ao Dai Runner - With Speech Bubbles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 100%);
            border: 3px solid #2F4F4F;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(47, 79, 79, 0.3);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 70%, #8FBC8F 100%);
            border-radius: 12px;
            cursor: pointer;
        }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #2F4F4F;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 10;
            background: rgba(255,255,255,0.8);
            padding: 12px 18px;
            border-radius: 10px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #2F4F4F;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 20px;
            border: 3px solid #2F4F4F;
            display: none;
            z-index: 20;
        }

        #restartBtn {
            background: linear-gradient(45deg, #32CD32, #228B22);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2F4F4F;
            font-size: 16px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 20px;
            z-index: 10;
        }

        #loadingScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2F4F4F;
            font-size: 18px;
            text-align: center;
            z-index: 15;
        }

        .loading-bar {
            width: 200px;
            height: 6px;
            background: rgba(47, 79, 79, 0.3);
            border-radius: 3px;
            margin: 15px auto;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(45deg, #32CD32, #228B22);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="loadingScreen">
            <div>Loading images...</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loadingProgress"></div>
            </div>
            <div style="font-size: 14px; margin-top: 10px;">
                <span id="loadingText">0/3 images loaded</span>
            </div>
        </div>
        <div id="ui" style="display: none;">
            <div>Score: <span id="score">0</span></div>
            <div style="font-size: 16px; margin-top: 5px;">Level: <span id="level">1</span></div>
        </div>
        <div id="instructions" style="display: none;">
            <div><strong>Tap or Click to Jump!</strong></div>
            <div style="font-size: 14px; margin-top: 8px;">
                🦘 Jump over ground obstacles<br>
                🦆 Duck under flying obstacles<br>
                💬 Listen to the street calls!
            </div>
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Level Reached: <span id="finalLevel">1</span></p>
            <p>Best Score: <span id="bestScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            class AoDaiRunner {
                constructor() {
                    this.canvas = document.getElementById('gameCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    
                    // Set canvas size
                    this.canvas.width = Math.min(window.innerWidth - 40, 800);
                    this.canvas.height = Math.min(window.innerHeight - 40, 400);
                    
                    this.gameState = 'loading';
                    this.score = 0;
                    this.level = 1;
                    this.bestScore = parseInt(localStorage.getItem('aoDaiRunnerBest')) || 0;
                    this.gameSpeed = 4;
                    this.gravity = 0.6;
                    
                    // Speech bubble phrases - your suggestions + additional ones
                    this.speechPhrases = [
                        // Your nightlife district phrases
                        "Massage sir",
                        "一杯だけどぞー",
                        "ちょっとだけ",
                        "おにーさん－",
                        "カラオケー",
                        "焼き鳥寿司ラーメンどーじょー",
                        "sup",
                        
                        // Additional contextual phrases
                        "Watch out!",
                        "Jump higher!",
                        "Xin chào!",
                        "Too slow!",
                        "Nice try!",
                        "Careful!",
                        "You can do it!",
                        "Come here!",
                        "Special price!",
                        "Very cheap!",
                        "Best massage!",
                        "Cold beer!",
                        "Happy hour!",
                        "Welcome!",
                        "こんばんは！",
                        "いらっしゃいませ！",
                        "安いよ！",
                        "美味しいよ！",
                        "町中華いかがですか？！"
                    ];
                    
                    // Image loading
                    this.images = {
                        player: null,
                        obstacle1: null,
                        obstacle2: null
                    };
                    this.imagesLoaded = 0;
                    this.totalImages = 3;
                    
                    // Enhanced player properties
                    this.player = {
                        x: 80,
                        y: 0,
                        width: 40,
                        height: 50,
                        velocityY: 0,
                        isJumping: false,
                        isDucking: false,
                        jumpPower: -16,
                        groundY: this.canvas.height - 110,
                        animFrame: 0,
                        duckHeight: 25,
                        normalHeight: 50
                    };
                    
                    this.player.y = this.player.groundY;
                    
                    // Enhanced obstacles system
                    this.obstacles = [];
                    this.obstacleSpawnTimer = 0;
                    this.obstacleSpawnInterval = 100;
                    this.minSpawnInterval = 40;
                    
                    // Speech bubbles array
                    this.speechBubbles = [];
                    
                    // Ground and air levels
                    this.groundY = this.canvas.height - 60;
                    this.airY = this.canvas.height - 200;
                    
                    // Clouds
                    this.clouds = [];
                    this.initializeClouds();
                    
                    // Difficulty progression
                    this.difficultyTimer = 0;
                    this.difficultyInterval = 1000;
                    
                    this.loadImages();
                }
                
                loadImages() {
                    // Load player image
                    this.images.player = new Image();
                    this.images.player.onload = () => {
                        console.log('Player image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.player.onerror = () => {
                        console.log('Player image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.player.src = 'images/player.png';
                    
                    // Load obstacle images
                    this.images.obstacle1 = new Image();
                    this.images.obstacle1.onload = () => {
                        console.log('Obstacle 1 image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle1.onerror = () => {
                        console.log('Obstacle 1 image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle1.src = 'images/obstacle.png';
                    
                    this.images.obstacle2 = new Image();
                    this.images.obstacle2.onload = () => {
                        console.log('Obstacle 2 image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle2.onerror = () => {
                        console.log('Obstacle 2 image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle2.src = 'images/obstacle2.png';
                }
                
                updateLoadingProgress() {
                    const progress = (this.imagesLoaded / this.totalImages) * 100;
                    document.getElementById('loadingProgress').style.width = progress + '%';
                    document.getElementById('loadingText').textContent = `${this.imagesLoaded}/${this.totalImages} images loaded`;
                    
                    if (this.imagesLoaded >= this.totalImages) {
                        setTimeout(() => {
                            this.checkImagesLoaded();
                        }, 500);
                    }
                }
                
                checkImagesLoaded() {
                    console.log('All images loaded, starting game');
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                    document.getElementById('instructions').style.display = 'block';
                    
                    this.gameState = 'ready';
                    this.setupEventListeners();
                    this.gameLoop();
                    
                    document.getElementById('bestScore').textContent = this.bestScore;
                }
                
                initializeClouds() {
                    for (let i = 0; i < 6; i++) {
                        this.clouds.push({
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * (this.canvas.height * 0.4),
                            width: 30 + Math.random() * 50,
                            speed: 0.3 + Math.random() * 1.2
                        });
                    }
                }
                
                setupEventListeners() {
                    // Touch events
                    this.canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.handleJump();
                    });
                    
                    // Mouse events
                    this.canvas.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.handleJump();
                    });
                    
                    // Keyboard events
                    document.addEventListener('keydown', (e) => {
                        if (e.code === 'Space' || e.code === 'ArrowUp') {
                            e.preventDefault();
                            this.handleJump();
                        }
                        if (e.code === 'ArrowDown') {
                            e.preventDefault();
                            this.handleDuck();
                        }
                    });
                    
                    document.addEventListener('keyup', (e) => {
                        if (e.code === 'ArrowDown') {
                            this.player.isDucking = false;
                            this.player.height = this.player.normalHeight;
                        }
                    });
                    
                    // Restart button
                    document.getElementById('restartBtn').addEventListener('click', () => {
                        this.restartGame();
                    });
                }
                
                handleJump() {
                    if (this.gameState === 'gameOver') {
                        this.restartGame();
                        return;
                    }
                    
                    if (this.gameState === 'ready') {
                        this.gameState = 'playing';
                        document.getElementById('instructions').style.display = 'none';
                    }
                    
                    if (this.gameState === 'playing' && !this.player.isJumping && !this.player.isDucking) {
                        this.player.velocityY = this.player.jumpPower;
                        this.player.isJumping = true;
                    }
                }
                
                handleDuck() {
                    if (this.gameState === 'playing' && !this.player.isJumping) {
                        this.player.isDucking = true;
                        this.player.height = this.player.duckHeight;
                    }
                }
                
                restartGame() {
                    this.gameState = 'ready';
                    this.score = 0;
                    this.level = 1;
                    this.gameSpeed = 4;
                    this.difficultyTimer = 0;
                    this.obstacleSpawnInterval = 100;
                    
                    // Reset player
                    this.player.y = this.player.groundY;
                    this.player.velocityY = 0;
                    this.player.isJumping = false;
                    this.player.isDucking = false;
                    this.player.height = this.player.normalHeight;
                    this.player.animFrame = 0;
                    
                    // Clear obstacles and speech bubbles
                    this.obstacles = [];
                    this.speechBubbles = [];
                    this.obstacleSpawnTimer = 0;
                    
                    // Show instructions
                    document.getElementById('gameOver').style.display = 'none';
                    document.getElementById('instructions').style.display = 'block';
                }
                
                // Create speech bubble for obstacle
                createSpeechBubble(obstacle) {
                    // 70% chance of creating a speech bubble
                    if (Math.random() < 0.7) {
                        const phrase = this.speechPhrases[Math.floor(Math.random() * this.speechPhrases.length)];
                        
                        const bubble = {
                            text: phrase,
                            x: obstacle.x + obstacle.width / 2,
                            y: obstacle.y - 20,
                            width: 0, // Will be calculated based on text
                            height: 25,
                            opacity: 0,
                            life: 180, // Frames to live (3 seconds at 60fps)
                            maxLife: 180,
                            targetObstacle: obstacle,
                            animationPhase: 0
                        };
                        
                        // Calculate bubble width based on text length
                        this.ctx.font = '12px Arial';
                        const textWidth = this.ctx.measureText(phrase).width;
                        bubble.width = Math.max(textWidth + 20, 60);
                        
                        this.speechBubbles.push(bubble);
                    }
                }
                
                update() {
                    if (this.gameState !== 'playing') return;
                    
                    // Update score and level
                    this.score += 1;
                    this.level = Math.floor(this.score / 500) + 1;
                    
                    // Increase game speed and difficulty
                    this.gameSpeed = 4 + (this.level * 0.5);
                    
                    // Update difficulty
                    this.difficultyTimer++;
                    if (this.difficultyTimer >= this.difficultyInterval) {
                        this.obstacleSpawnInterval = Math.max(this.minSpawnInterval, this.obstacleSpawnInterval - 5);
                        this.difficultyTimer = 0;
                    }
                    
                    // Update player physics
                    if (this.player.isJumping) {
                        this.player.velocityY += this.gravity;
                        this.player.y += this.player.velocityY;
                        
                        // Check if landed
                        if (this.player.y >= this.player.groundY) {
                            this.player.y = this.player.groundY;
                            this.player.velocityY = 0;
                            this.player.isJumping = false;
                        }
                    }
                    
                    // Update player animation
                    this.player.animFrame += 0.3;
                    
                    // Spawn obstacles with enhanced patterns
                    this.obstacleSpawnTimer++;
                    if (this.obstacleSpawnTimer >= this.obstacleSpawnInterval) {
                        this.spawnObstaclePattern();
                        this.obstacleSpawnTimer = 0;
                    }
                    
                    // Update obstacles
                    for (let i = this.obstacles.length - 1; i >= 0; i--) {
                        const obstacle = this.obstacles[i];
                        obstacle.x -= this.gameSpeed;
                        
                        // Update flying obstacles
                        if (obstacle.isFlying) {
                            obstacle.floatOffset += obstacle.floatSpeed;
                            obstacle.y = obstacle.baseY + Math.sin(obstacle.floatOffset) * obstacle.floatAmplitude;
                        }
                        
                        // Remove off-screen obstacles
                        if (obstacle.x + obstacle.width < 0) {
                            this.obstacles.splice(i, 1);
                            continue;
                        }
                        
                        // Check collision
                        if (this.checkCollision(this.player, obstacle)) {
                            this.gameOver();
                            return;
                        }
                    }
                    
                    // Update speech bubbles
                    for (let i = this.speechBubbles.length - 1; i >= 0; i--) {
                        const bubble = this.speechBubbles[i];
                        
                        // Move bubble with its target obstacle
                        if (bubble.targetObstacle) {
                            bubble.x = bubble.targetObstacle.x + bubble.targetObstacle.width / 2;
                            bubble.y = bubble.targetObstacle.y - 30;
                        }
                        
                        // Update bubble animation
                        bubble.animationPhase += 0.1;
                        bubble.life--;
                        
                        // Fade in/out animation
                        if (bubble.life > bubble.maxLife * 0.8) {
                            // Fade in
                            bubble.opacity = Math.min(1, (bubble.maxLife - bubble.life) / (bubble.maxLife * 0.2));
                        } else if (bubble.life < bubble.maxLife * 0.3) {
                            // Fade out
                            bubble.opacity = bubble.life / (bubble.maxLife * 0.3);
                        } else {
                            bubble.opacity = 1;
                        }
                        
                        // Remove expired bubbles
                        if (bubble.life <= 0) {
                            this.speechBubbles.splice(i, 1);
                        }
                    }
                    
                    // Update clouds
                    this.clouds.forEach(cloud => {
                        cloud.x -= cloud.speed;
                        if (cloud.x + cloud.width < 0) {
                            cloud.x = this.canvas.width + Math.random() * 100;
                            cloud.y = Math.random() * (this.canvas.height * 0.4);
                        }
                    });
                    
                    // Update UI
                    document.getElementById('score').textContent = this.score;
                    document.getElementById('level').textContent = this.level;
                }
                
                spawnObstaclePattern() {
                    const patterns = [
                        'single',
                        'double',
                        'stack',
                        'flying',
                        'mixed',
                        'triple'
                    ];
                    
                    let availablePatterns = patterns.slice(0, Math.min(3 + Math.floor(this.level / 2), patterns.length));
                    const pattern = availablePatterns[Math.floor(Math.random() * availablePatterns.length)];
                    
                    switch (pattern) {
                        case 'single':
                            this.spawnSingleObstacle();
                            break;
                        case 'double':
                            this.spawnDoubleObstacle();
                            break;
                        case 'stack':
                            this.spawnStackedObstacle();
                            break;
                        case 'flying':
                            this.spawnFlyingObstacle();
                            break;
                        case 'mixed':
                            this.spawnMixedObstacle();
                            break;
                        case 'triple':
                            this.spawnTripleObstacle();
                            break;
                    }
                }
                
                spawnSingleObstacle() {
                    const isFlying = Math.random() < 0.3;
                    this.createObstacle(this.canvas.width, isFlying);
                }
                
                spawnDoubleObstacle() {
                    this.createObstacle(this.canvas.width, false);
                    this.createObstacle(this.canvas.width + 60 + Math.random() * 40, false);
                }
                
                spawnStackedObstacle() {
                    const x = this.canvas.width;
                    this.createObstacle(x, false, 'small');
                    this.createObstacle(x, false, 'small', this.groundY - 70);
                }
                
                spawnFlyingObstacle() {
                    this.createObstacle(this.canvas.width, true);
                }
                
                spawnMixedObstacle() {
                    this.createObstacle(this.canvas.width, false);
                    this.createObstacle(this.canvas.width + 40, true);
                }
                
                spawnTripleObstacle() {
                    const baseX = this.canvas.width;
                    this.createObstacle(baseX, false, 'small');
                    this.createObstacle(baseX + 45, true, 'small');
                    this.createObstacle(baseX + 90, false, 'small');
                }
                
                createObstacle(x, isFlying = false, size = 'normal', customY = null) {
                    const obstacleType = Math.random() < 0.5 ? 'obstacle1' : 'obstacle2';
                    
                    // Size variations
                    let width, height;
                    switch (size) {
                        case 'small':
                            width = 20 + Math.random() * 15;
                            height = 25 + Math.random() * 15;
                            break;
                        case 'large':
                            width = 40 + Math.random() * 20;
                            height = 50 + Math.random() * 20;
                            break;
                        default:
                            width = 25 + Math.random() * 20;
                            height = 35 + Math.random() * 15;
                    }
                    
                    let y;
                    if (customY !== null) {
                        y = customY - height;
                    } else if (isFlying) {
                        y = this.airY - height + (Math.random() * 60 - 30);
                    } else {
                        y = this.groundY - height;
                    }
                    
                    const obstacle = {
                        x: x,
                        y: y,
                        width: width,
                        height: height,
                        type: obstacleType,
                        isFlying: isFlying,
                        size: size
                    };
                    
                    // Add floating animation for flying obstacles
                    if (isFlying) {
                        obstacle.baseY = y;
                        obstacle.floatOffset = Math.random() * Math.PI * 2;
                        obstacle.floatSpeed = 0.05 + Math.random() * 0.05;
                        obstacle.floatAmplitude = 5 + Math.random() * 10;
                    }
                    
                    this.obstacles.push(obstacle);
                    
                    // Create speech bubble for this obstacle
                    this.createSpeechBubble(obstacle);
                }
                
                checkCollision(player, obstacle) {
                    const margin = 3;
                    
                    const playerHeight = player.isDucking ? player.duckHeight : player.height;
                    const playerY = player.isDucking ? player.groundY + (player.normalHeight - player.duckHeight) : player.y;
                    
                    return player.x + margin < obstacle.x + obstacle.width &&
                           player.x + player.width - margin > obstacle.x &&
                           playerY + margin < obstacle.y + obstacle.height &&
                           playerY + playerHeight - margin > obstacle.y;
                }
                
                gameOver() {
                    this.gameState = 'gameOver';
                    
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('aoDaiRunnerBest', this.bestScore.toString());
                    }
                    
                    document.getElementById('finalScore').textContent = this.score;
                    document.getElementById('finalLevel').textContent = this.level;
                    document.getElementById('bestScore').textContent = this.bestScore;
                    document.getElementById('gameOver').style.display = 'block';
                }
                
                drawSpeechBubble(bubble) {
                    if (bubble.opacity <= 0) return;
                    
                    this.ctx.save();
                    this.ctx.globalAlpha = bubble.opacity;
                    
                    // Calculate bubble position
                    const bubbleX = bubble.x - bubble.width / 2;
                    const bubbleY = bubble.y - bubble.height + Math.sin(bubble.animationPhase) * 2;
                    
                    // Draw bubble shadow
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                    this.ctx.beginPath();
                    this.ctx.roundRect(bubbleX + 2, bubbleY + 2, bubble.width, bubble.height, 12);
                    this.ctx.fill();
                    
                    // Draw bubble background
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    this.ctx.beginPath();
                    this.ctx.roundRect(bubbleX, bubbleY, bubble.width, bubble.height, 12);
                    this.ctx.fill();
                    
                    // Draw bubble border
                    this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                    this.ctx.lineWidth = 1;
                    this.ctx.stroke();
                    
                    // Draw bubble tail (pointer)
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    this.ctx.beginPath();
                    this.ctx.moveTo(bubble.x - 8, bubbleY + bubble.height);
                    this.ctx.lineTo(bubble.x, bubbleY + bubble.height + 8);
                    this.ctx.lineTo(bubble.x + 8, bubbleY + bubble.height);
                    this.ctx.closePath();
                    this.ctx.fill();
                    this.ctx.stroke();
                    
                    // Draw text
                    this.ctx.fillStyle = '#333';
                    this.ctx.font = 'bold 12px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(
                        bubble.text,
                        bubble.x,
                        bubbleY + bubble.height / 2
                    );
                    
                    this.ctx.restore();
                }
                
                draw() {
                    // Clear canvas with enhanced sky gradient
                    const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                    gradient.addColorStop(0, '#87CEEB');
                    gradient.addColorStop(0.3, '#98D8E8');
                    gradient.addColorStop(0.7, '#90EE90');
                    gradient.addColorStop(1, '#8FBC8F');
                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    // Draw enhanced clouds
                    this.clouds.forEach(cloud => {
                        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                        this.ctx.beginPath();
                        this.ctx.arc(cloud.x, cloud.y, cloud.width/5, 0, Math.PI * 2);
                        this.ctx.arc(cloud.x + cloud.width/4, cloud.y, cloud.width/4, 0, Math.PI * 2);
                        this.ctx.arc(cloud.x + cloud.width/2, cloud.y, cloud.width/3, 0, Math.PI * 2);
                        this.ctx.arc(cloud.x + cloud.width*3/4, cloud.y, cloud.width/4, 0, Math.PI * 2);
                        this.ctx.fill();
                    });
                    
                    // Draw ground with texture
                    this.ctx.fillStyle = '#8FBC8F';
                                        this.ctx.fillRect(0, this.groundY, this.canvas.width, this.canvas.height - this.groundY);
                    
                    // Ground details
                    this.ctx.fillStyle = '#7CFC00';
                    for (let i = 0; i < this.canvas.width; i += 30) {
                        this.ctx.fillRect(i, this.groundY, 20, 3);
                    }
                    
                    // Draw ground line
                    this.ctx.strokeStyle = '#228B22';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, this.groundY);
                    this.ctx.lineTo(this.canvas.width, this.groundY);
                    this.ctx.stroke();
                    
                    // Draw obstacles with enhanced visuals
                    this.obstacles.forEach(obstacle => {
                        const obstacleImage = this.images[obstacle.type];
                        
                        // Add shadow for flying obstacles
                        if (obstacle.isFlying) {
                            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                            this.ctx.beginPath();
                            this.ctx.ellipse(
                                obstacle.x + obstacle.width/2,
                                this.groundY - 5,
                                obstacle.width/2,
                                8,
                                0, 0, Math.PI * 2
                            );
                            this.ctx.fill();
                        }
                        
                        if (obstacleImage && obstacleImage.complete) {
                            // Add glow effect for flying obstacles
                            if (obstacle.isFlying) {
                                this.ctx.shadowColor = '#FFD700';
                                this.ctx.shadowBlur = 10;
                            }
                            
                            this.ctx.drawImage(
                                obstacleImage,
                                obstacle.x,
                                obstacle.y,
                                obstacle.width,
                                obstacle.height
                            );
                            
                            this.ctx.shadowBlur = 0;
                        } else {
                            // Enhanced fallback with different colors
                            if (obstacle.isFlying) {
                                this.ctx.fillStyle = obstacle.type === 'obstacle1' ? '#FFD700' : '#FF6347';
                            } else {
                                this.ctx.fillStyle = obstacle.type === 'obstacle1' ? '#228B22' : '#32CD32';
                            }
                            this.ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                            
                            // Add size indicator
                            if (obstacle.size === 'small') {
                                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                                this.ctx.fillRect(obstacle.x + 2, obstacle.y + 2, obstacle.width - 4, 3);
                            }
                        }
                    });
                    
                    // Draw speech bubbles BEFORE drawing player (so player appears on top)
                    this.speechBubbles.forEach(bubble => {
                        this.drawSpeechBubble(bubble);
                    });
                    
                    // Draw enhanced player
                    let playerY = this.player.y;
                    let playerHeight = this.player.height;
                    
                    // Adjust for ducking
                    if (this.player.isDucking) {
                        playerY = this.player.groundY + (this.player.normalHeight - this.player.duckHeight);
                        playerHeight = this.player.duckHeight;
                    }
                    
                    // Running bounce animation
                    if (!this.player.isJumping && !this.player.isDucking) {
                        playerY += Math.sin(this.player.animFrame) * 3;
                    }
                    
                    if (this.images.player && this.images.player.complete) {
                        // Add motion blur effect when jumping
                        if (this.player.isJumping && Math.abs(this.player.velocityY) > 5) {
                            this.ctx.globalAlpha = 0.7;
                        }
                        
                        this.ctx.drawImage(
                            this.images.player,
                            this.player.x,
                            playerY,
                            this.player.width,
                            playerHeight
                        );
                        
                        this.ctx.globalAlpha = 1.0;
                    } else {
                        // Enhanced fallback player
                        this.ctx.fillStyle = '#DC143C';
                        this.ctx.fillRect(this.player.x, playerY, this.player.width, playerHeight);
                        
                        // Add simple face
                        this.ctx.fillStyle = '#fdbcb4';
                        this.ctx.fillRect(this.player.x + 8, playerY + 2, 24, 15);
                    }
                    
                    // Draw level indicator
                    if (this.level > 1) {
                        this.ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
                        this.ctx.font = 'bold 16px Arial';
                        this.ctx.textAlign = 'right';
                        this.ctx.fillText(`Level ${this.level}!`, this.canvas.width - 20, 50);
                    }
                    
                    // Reset text alignment for other text
                    this.ctx.textAlign = 'left';
                }
                
                gameLoop() {
                    this.update();
                    this.draw();
                    requestAnimationFrame(() => this.gameLoop());
                }
            }
            
            // Add roundRect method if not supported
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                    this.beginPath();
                    this.moveTo(x + radius, y);
                    this.lineTo(x + width - radius, y);
                    this.quadraticCurveTo(x + width, y, x + width, y + radius);
                    this.lineTo(x + width, y + height - radius);
                    this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                    this.lineTo(x + radius, y + height);
                    this.quadraticCurveTo(x, y + height, x, y + height - radius);
                    this.lineTo(x, y + radius);
                    this.quadraticCurveTo(x, y, x + radius, y);
                    this.closePath();
                };
            }
            
            // Start the game
            new AoDaiRunner();
        });
    </script>
