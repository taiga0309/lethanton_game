<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ao Dai Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 100%);
            border: 3px solid #2F4F4F;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(47, 79, 79, 0.3);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 70%, #8FBC8F 100%);
            border-radius: 12px;
            cursor: pointer;
        }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #2F4F4F;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 10;
            background: rgba(255,255,255,0.7);
            padding: 12px 18px;
            border-radius: 10px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #2F4F4F;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 20px;
            border: 3px solid #2F4F4F;
            display: none;
            z-index: 20;
        }

        #restartBtn {
            background: linear-gradient(45deg, #32CD32, #228B22);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2F4F4F;
            font-size: 16px;
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10;
        }

        #loadingScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2F4F4F;
            font-size: 18px;
            text-align: center;
            z-index: 15;
        }

        .loading-bar {
            width: 200px;
            height: 6px;
            background: rgba(47, 79, 79, 0.3);
            border-radius: 3px;
            margin: 15px auto;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(45deg, #32CD32, #228B22);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="loadingScreen">
            <div>Loading images...</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loadingProgress"></div>
            </div>
            <div style="font-size: 14px; margin-top: 10px;">
                <span id="loadingText">0/3 images loaded</span>
            </div>
        </div>
        <div id="ui" style="display: none;">
            <div>Score: <span id="score">0</span></div>
        </div>
        <div id="instructions" style="display: none;">
            Tap or Click to Jump!
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Best Score: <span id="bestScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            class AoDaiRunner {
                constructor() {
                    this.canvas = document.getElementById('gameCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    
                    // Set canvas size
                    this.canvas.width = Math.min(window.innerWidth - 40, 800);
                    this.canvas.height = Math.min(window.innerHeight - 40, 400);
                    
                    this.gameState = 'loading';
                    this.score = 0;
                    this.bestScore = parseInt(localStorage.getItem('aoDaiRunnerBest')) || 0;
                    this.gameSpeed = 4;
                    this.gravity = 0.6;
                    
                    // Image loading - now with 3 images
                    this.images = {
                        player: null,
                        obstacle1: null,
                        obstacle2: null
                    };
                    this.imagesLoaded = 0;
                    this.totalImages = 3;
                    
                    // Player properties
                    this.player = {
                        x: 80,
                        y: 0,
                        width: 40,
                        height: 50,
                        velocityY: 0,
                        isJumping: false,
                        jumpPower: -15,
                        groundY: this.canvas.height - 110,
                        animFrame: 0
                    };
                    
                    this.player.y = this.player.groundY;
                    
                    // Obstacles
                    this.obstacles = [];
                    this.obstacleSpawnTimer = 0;
                    this.obstacleSpawnInterval = 120;
                    
                    // Ground
                    this.groundY = this.canvas.height - 60;
                    
                    // Clouds
                    this.clouds = [];
                    this.initializeClouds();
                    
                    // Load images first
                    this.loadImages();
                }
                
                loadImages() {
                    // Load player image
                    this.images.player = new Image();
                    this.images.player.onload = () => {
                        console.log('Player image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.player.onerror = () => {
                        console.log('Player image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.player.src = 'images/player.png';
                    
                    // Load first obstacle image
                    this.images.obstacle1 = new Image();
                    this.images.obstacle1.onload = () => {
                        console.log('Obstacle 1 image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle1.onerror = () => {
                        console.log('Obstacle 1 image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle1.src = 'images/obstacle.png';
                    
                    // Load second obstacle image
                    this.images.obstacle2 = new Image();
                    this.images.obstacle2.onload = () => {
                        console.log('Obstacle 2 image loaded successfully');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle2.onerror = () => {
                        console.log('Obstacle 2 image failed to load, using fallback');
                        this.imagesLoaded++;
                        this.updateLoadingProgress();
                    };
                    this.images.obstacle2.src = 'images/obstacle2.png';
                }
                
                updateLoadingProgress() {
                    const progress = (this.imagesLoaded / this.totalImages) * 100;
                    document.getElementById('loadingProgress').style.width = progress + '%';
                    document.getElementById('loadingText').textContent = `${this.imagesLoaded}/${this.totalImages} images loaded`;
                    
                    if (this.imagesLoaded >= this.totalImages) {
                        setTimeout(() => {
                            this.checkImagesLoaded();
                        }, 500); // Small delay to show 100% progress
                    }
                }
                
                checkImagesLoaded() {
                    console.log('All images loaded, starting game');
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                    document.getElementById('instructions').style.display = 'block';
                    
                    this.gameState = 'ready';
                    this.setupEventListeners();
                    this.gameLoop();
                    
                    // Update best score display
                    document.getElementById('bestScore').textContent = this.bestScore;
                }
                
                initializeClouds() {
                    for (let i = 0; i < 5; i++) {
                        this.clouds.push({
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * (this.canvas.height * 0.3),
                            width: 40 + Math.random() * 40,
                            speed: 0.5 + Math.random() * 1
                        });
                    }
                }
                
                setupEventListeners() {
                    // Touch events
                    this.canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.handleJump();
                    });
                    
                    // Mouse events
                    this.canvas.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.handleJump();
                    });
                    
                    // Keyboard events
                    document.addEventListener('keydown', (e) => {
                        if (e.code === 'Space' || e.code === 'ArrowUp') {
                            e.preventDefault();
                            this.handleJump();
                        }
                    });
                    
                    // Restart button
                    document.getElementById('restartBtn').addEventListener('click', () => {
                        this.restartGame();
                    });
                }
                
                handleJump() {
                    if (this.gameState === 'gameOver') {
                        this.restartGame();
                        return;
                    }
                    
                    if (this.gameState === 'ready') {
                        this.gameState = 'playing';
                        document.getElementById('instructions').style.display = 'none';
                    }
                    
                    if (this.gameState === 'playing' && !this.player.isJumping) {
                        this.player.velocityY = this.player.jumpPower;
                        this.player.isJumping = true;
                    }
                }
                
                restartGame() {
                    this.gameState = 'ready';
                    this.score = 0;
                    this.gameSpeed = 4;
                    
                    // Reset player
                    this.player.y = this.player.groundY;
                    this.player.velocityY = 0;
                    this.player.isJumping = false;
                    this.player.animFrame = 0;
                    
                    // Clear obstacles
                    this.obstacles = [];
                    this.obstacleSpawnTimer = 0;
                    
                    // Show instructions
                    document.getElementById('gameOver').style.display = 'none';
                    document.getElementById('instructions').style.display = 'block';
                }
                
                update() {
                    if (this.gameState !== 'playing') return;
                    
                    // Update score
                    this.score += 1;
                    
                    // Increase game speed gradually
                    this.gameSpeed = 4 + (this.score / 1000);
                    
                    // Update player physics
                    if (this.player.isJumping) {
                        this.player.velocityY += this.gravity;
                        this.player.y += this.player.velocityY;
                        
                        // Check if landed
                        if (this.player.y >= this.player.groundY) {
                            this.player.y = this.player.groundY;
                            this.player.velocityY = 0;
                            this.player.isJumping = false;
                        }
                    }
                    
                    // Update player animation
                    this.player.animFrame += 0.2;
                    
                    // Spawn obstacles
                    this.obstacleSpawnTimer++;
                    if (this.obstacleSpawnTimer >= this.obstacleSpawnInterval) {
                        this.spawnObstacle();
                        this.obstacleSpawnTimer = 0;
                        
                        // Gradually decrease spawn interval
                        this.obstacleSpawnInterval = Math.max(60, 120 - Math.floor(this.score / 500));
                    }
                    
                    // Update obstacles
                    for (let i = this.obstacles.length - 1; i >= 0; i--) {
                        const obstacle = this.obstacles[i];
                        obstacle.x -= this.gameSpeed;
                        
                        // Remove off-screen obstacles
                        if (obstacle.x + obstacle.width < 0) {
                            this.obstacles.splice(i, 1);
                            continue;
                        }
                        
                        // Check collision
                        if (this.checkCollision(this.player, obstacle)) {
                            this.gameOver();
                            return;
                        }
                    }
                    
                    // Update clouds
                    this.clouds.forEach(cloud => {
                        cloud.x -= cloud.speed;
                        if (cloud.x + cloud.width < 0) {
                            cloud.x = this.canvas.width;
                            cloud.y = Math.random() * (this.canvas.height * 0.3);
                        }
                    });
                    
                    // Update UI
                    document.getElementById('score').textContent = this.score;
                }
                
                spawnObstacle() {
                    // Randomly choose between obstacle1 and obstacle2
                    const obstacleType = Math.random() < 0.5 ? 'obstacle1' : 'obstacle2';
                    
                    const obstacle = {
                        x: this.canvas.width,
                        y: this.groundY - 40,
                        width: 30,
                        height: 40,
                        type: obstacleType // Store which obstacle image to use
                    };
                    
                    this.obstacles.push(obstacle);
                }
                
                checkCollision(player, obstacle) {
                    // Slightly more forgiving collision detection
                    const margin = 5;
                    return player.x + margin < obstacle.x + obstacle.width &&
                           player.x + player.width - margin > obstacle.x &&
                           player.y + margin < obstacle.y + obstacle.height &&
                           player.y + player.height - margin > obstacle.y;
                }
                
                gameOver() {
                    this.gameState = 'gameOver';
                    
                    // Update best score
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('aoDaiRunnerBest', this.bestScore.toString());
                    }
                    
                    document.getElementById('finalScore').textContent = this.score;
                    document.getElementById('bestScore').textContent = this.bestScore;
                    document.getElementById('gameOver').style.display = 'block';
                }
                
                draw() {
                    // Clear canvas with sky gradient
                    const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                    gradient.addColorStop(0, '#87CEEB');
                    gradient.addColorStop(0.7, '#90EE90');
                    gradient.addColorStop(1, '#8FBC8F');
                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    // Draw clouds
                    this.clouds.forEach(cloud => {
                        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                        this.ctx.beginPath();
                        this.ctx.arc(cloud.x, cloud.y, cloud.width/4, 0, Math.PI * 2);
                        this.ctx.arc(cloud.x + cloud.width/3, cloud.y, cloud.width/3, 0, Math.PI * 2);
                        this.ctx.arc(cloud.x + cloud.width*2/3, cloud.y, cloud.width/4, 0, Math.PI * 2);
                        this.ctx.fill();
                    });
                    
                    // Draw ground
                    this.ctx.fillStyle = '#8FBC8F';
                    this.ctx.fillRect(0, this.groundY, this.canvas.width, this.canvas.height - this.groundY);
                    
                    // Draw ground line
                    this.ctx.strokeStyle = '#228B22';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, this.groundY);
                    this.ctx.lineTo(this.canvas.width, this.groundY);
                    this.ctx.stroke();
                    
                    // Draw obstacles
                    this.obstacles.forEach(obstacle => {
                        const obstacleImage = this.images[obstacle.type];
                        
                        if (obstacleImage && obstacleImage.complete) {
                            // Draw the appropriate obstacle image
                            this.ctx.drawImage(
                                obstacleImage,
                                obstacle.x,
                                obstacle.y,
                                obstacle.width,
                                obstacle.height
                            );
                        } else {
                            // Fallback rectangle if image fails to load
                            this.ctx.fillStyle = obstacle.type === 'obstacle1' ? '#228B22' : '#32CD32';
                            this.ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                        }
                    });
                    
                    // Draw player
                    let playerY = this.player.y;
                    if (!this.player.isJumping) {
                        playerY += Math.sin(this.player.animFrame) * 2; // Running bounce
                    }
                    
                    if (this.images.player && this.images.player.complete) {
                        // Draw your custom player image
                        this.ctx.drawImage(
                            this.images.player,
                            this.player.x,
                            playerY,
                            this.player.width,
                            this.player.height
                        );
                    } else {
                        // Fallback rectangle if image fails to load
                        this.ctx.fillStyle = '#DC143C';
                        this.ctx.fillRect(this.player.x, playerY, this.player.width, this.player.height);
                    }
                }
                
                gameLoop() {
                    this.update();
                    this.draw();
                    requestAnimationFrame(() => this.gameLoop());
                }
            }
            
            // Start the game
            new AoDaiRunner();
        });
    </script>
</body>
</html>
