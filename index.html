<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avoidance Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
            border-radius: 8px;
            cursor: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            color: #e94560;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #0f3460;
            display: none;
            z-index: 20;
        }

        #gameOver h2 {
            margin-bottom: 15px;
            font-size: 28px;
        }

        #gameOver p {
            margin: 10px 0;
            font-size: 18px;
        }

        #restartBtn {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        #restartBtn:hover {
            background: #d63447;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Speed: <span id="speed">1.0x</span></div>
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Survival Time: <span id="survivalTime">0</span>s</p>
            <button id="restartBtn">Tap to Restart</button>
        </div>
    </div>

    <script>
        class AvoidanceGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.setupCanvas();
                
                this.gameState = 'playing'; // 'playing' or 'gameOver'
                this.score = 0;
                this.startTime = Date.now();
                
                // Player properties
                this.player = {
                    x: 0,
                    y: 0,
                    targetX: 0,
                    targetY: 0,
                    radius: 15,
                    speed: 0.15 // Smooth movement factor
                };
                
                // NPCs array
                this.npcs = [];
                this.npcSpawnTimer = 0;
                this.npcSpawnInterval = 60; // frames
                this.baseNpcSpeed = 2;
                this.speedMultiplier = 1;
                
                // Lanes for organized spawning
                this.lanes = 5;
                this.laneWidth = 0;
                
                this.setupEventListeners();
                this.resetGame();
                this.gameLoop();
            }
            
            setupCanvas() {
                const container = document.getElementById('gameContainer');
                const maxWidth = Math.min(window.innerWidth - 40, 400);
                const maxHeight = Math.min(window.innerHeight - 40, 700);
                
                this.canvas.width = maxWidth;
                this.canvas.height = maxHeight;
                
                this.laneWidth = this.canvas.width / this.lanes;
            }
            
            setupEventListeners() {
                // Touch events
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.gameState === 'gameOver') {
                        this.restartGame();
                        return;
                    }
                    this.handleTouch(e.touches[0]);
                });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (this.gameState === 'playing') {
                        this.handleTouch(e.touches[0]);
                    }
                });
                
                // Mouse events for desktop testing
                this.canvas.addEventListener('mousedown', (e) => {
                    if (this.gameState === 'gameOver') {
                        this.restartGame();
                        return;
                    }
                    this.handleMouse(e);
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.gameState === 'playing') {
                        this.handleMouse(e);
                    }
                });
                
                // Restart button
                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.restartGame();
                });
            }
            
            handleTouch(touch) {
                const rect = this.canvas.getBoundingClientRect();
                this.player.targetX = touch.clientX - rect.left;
                this.player.targetY = touch.clientY - rect.top;
            }
            
            handleMouse(e) {
                const rect = this.canvas.getBoundingClientRect();
                this.player.targetX = e.clientX - rect.left;
                this.player.targetY = e.clientY - rect.top;
            }
            
            resetGame() {
                this.gameState = 'playing';
                this.score = 0;
                this.startTime = Date.now();
                this.speedMultiplier = 1;
                
                // Reset player position
                this.player.x = this.canvas.width / 2;
                this.player.y = this.canvas.height - 100;
                this.player.targetX = this.player.x;
                this.player.targetY = this.player.y;
                
                // Clear NPCs
                this.npcs = [];
                this.npcSpawnTimer = 0;
                
                // Hide game over screen
                document.getElementById('gameOver').style.display = 'none';
            }
            
            restartGame() {
                this.resetGame();
            }
            
            update() {
                if (this.gameState !== 'playing') return;
                
                // Update score and speed
                this.score = Math.floor((Date.now() - this.startTime) / 100);
                this.speedMultiplier = 1 + (this.score / 1000);
                
                // Update player position with smooth movement
                const dx = this.player.targetX - this.player.x;
                const dy = this.player.targetY - this.player.y;
                this.player.x += dx * this.player.speed;
                this.player.y += dy * this.player.speed;
                
                // Keep player in bounds
                this.player.x = Math.max(this.player.radius, Math.min(this.canvas.width - this.player.radius, this.player.x));
                this.player.y = Math.max(this.player.radius, Math.min(this.canvas.height - this.player.radius, this.player.y));
                
                // Spawn NPCs
                this.npcSpawnTimer++;
                if (this.npcSpawnTimer >= this.npcSpawnInterval) {
                    this.spawnNPC();
                    this.npcSpawnTimer = 0;
                    
                    // Gradually decrease spawn interval (increase frequency)
                    this.npcSpawnInterval = Math.max(30, 60 - Math.floor(this.score / 200));
                }
                
                // Update NPCs
                for (let i = this.npcs.length - 1; i >= 0; i--) {
                    const npc = this.npcs[i];
                    npc.y += npc.speed * this.speedMultiplier;
                    
                    // Remove NPCs that are off screen
                    if (npc.y > this.canvas.height + npc.radius) {
                        this.npcs.splice(i, 1);
                        continue;
                    }
                    
                    // Check collision with player
                    if (this.checkCollision(this.player, npc)) {
                        this.gameOver();
                        return;
                    }
                }
                
                // Update UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('speed').textContent = this.speedMultiplier.toFixed(1) + 'x';
            }
            
            spawnNPC() {
                // Choose a lane with some randomness
                const baseLane = Math.floor(Math.random() * this.lanes);
                const laneOffset = (Math.random() - 0.5) * this.laneWidth * 0.8;
                const x = baseLane * this.laneWidth + this.laneWidth / 2 + laneOffset;
                
                // Ensure NPCs don't spawn too close to player horizontally
                const playerLane = Math.floor(this.player.x / this.laneWidth);
                const npcLane = Math.floor(x / this.laneWidth);
                
                // Sometimes skip spawning if it would be unfair
                if (Math.abs(playerLane - npcLane) <= 1 && Math.random() < 0.3) {
                    return;
                }
                
                const npc = {
                    x: Math.max(20, Math.min(this.canvas.width - 20, x)),
                    y: -30,
                    radius: 12 + Math.random() * 8,
                    speed: this.baseNpcSpeed + Math.random() * 1,
                    color: this.getRandomNPCColor()
                };
                
                this.npcs.push(npc);
            }
            
            getRandomNPCColor() {
                const colors = ['#e94560', '#f39c12', '#e74c3c', '#9b59b6', '#3498db'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            checkCollision(obj1, obj2) {
                const dx = obj1.x - obj2.x;
                const dy = obj1.y - obj2.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                // Slightly forgiving collision detection
                return distance < (obj1.radius + obj2.radius) * 0.8;
            }
            
            gameOver() {
                this.gameState = 'gameOver';
                const survivalTime = ((Date.now() - this.startTime) / 1000).toFixed(1);
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('survivalTime').textContent = survivalTime;
                document.getElementById('gameOver').style.display = 'block';
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw lane guides (subtle)
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 1; i < this.lanes; i++) {
                    const x = i * this.laneWidth;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                // Draw NPCs
                this.npcs.forEach(npc => {
                    this.ctx.fillStyle = npc.color;
                    this.ctx.beginPath();
                    this.ctx.arc(npc.x, npc.y, npc.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Add a subtle glow effect
                    this.ctx.shadowColor = npc.color;
                    this.ctx.shadowBlur = 10;
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });
                
                // Draw player
                this.ctx.fillStyle = '#00ff88';
                this.ctx.beginPath();
                this.ctx.arc(this.player.x, this.player.y, this.player.radius, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Player glow effect
                this.ctx.shadowColor = '#00ff88';
                this.ctx.shadowBlur = 15;
                this.ctx.fill();
                this.ctx.shadowBlur = 0;
                
                // Draw player direction indicator
                const dx = this.player.targetX - this.player.x;
                const dy = this.player.targetY - this.player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 5) {
                    this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.player.x, this.player.y);
                    this.ctx.lineTo(
                        this.player.x + (dx / distance) * (this.player.radius + 10),
                        this.player.y + (dy / distance) * (this.player.radius + 10)
                    );
                    this.ctx.stroke();
                }
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start the game when page loads
        window.addEventListener('load', () => {
            new AvoidanceGame();
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            location.reload(); // Simple solution for resize
        });
    </script>
</body>
</html>
